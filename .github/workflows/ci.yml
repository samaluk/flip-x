name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Convex API
        run: CONVEX_AGENT_MODE=anonymous npx convex dev --once

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Visual regression (Vitest browser, Linux Docker)
        run: pnpm test:vrt

      - name: Build
        run: pnpm build

  # Requires GitHub secret CONVEX_DEPLOY_KEY = Convex "Preview" deploy key (not production).
  # Deploys a preview backend, sets NEXT_PUBLIC_CONVEX_URL for the command, then runs Playwright.
  # Skipped when the secret is missing (e.g. fork PRs). Preview keys: https://docs.convex.dev/production/hosting/preview-deployments
  e2e:
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ secrets.CONVEX_DEPLOY_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Convex API
        run: CONVEX_AGENT_MODE=anonymous npx convex dev --once

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Deploy Convex preview and run E2E
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_PREVIEW_NAME: ${{ github.head_ref || github.ref_name || format('ci-{0}', github.run_id) }}
        run: bash scripts/convex-preview-e2e.sh
