name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Convex API
        run: CONVEX_AGENT_MODE=anonymous npx convex dev --once

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Visual regression (Vitest browser, Linux Docker)
        run: pnpm test:vrt

      - name: Build
        run: pnpm build

  # Playwright against a local Convex backend (no cloud deploy or deploy key).
  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Convex API
        run: CONVEX_AGENT_MODE=anonymous npx convex dev --once

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E (local Convex)
        env:
          CONVEX_AGENT_MODE: anonymous
        run: bash scripts/convex-preview-e2e.sh
