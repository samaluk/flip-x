name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Convex API
        run: CONVEX_AGENT_MODE=anonymous npx convex dev --once

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Cache Next.js
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build
        run: pnpm build

      - name: Visual regression (Vitest browser, Linux Docker)
        env:
          SKIP_VRT_DOCKER_INSTALL: "1"
        run: pnpm test:vrt

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run E2E (local Convex)
        env:
          CONVEX_AGENT_MODE: anonymous
        run: bash scripts/convex-preview-e2e.sh
