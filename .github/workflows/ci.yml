name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Convex preview deployment name
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "PREVIEW_DEPLOYMENT_NAME=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
            echo "GITHUB_PR_NUMBER=${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
          else
            echo "PREVIEW_DEPLOYMENT_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Lint DESIGN.md
        run: pnpm design:lint

      - name: Lint
        run: pnpm lint

      - name: Fallow
        uses: fallow-rs/fallow@v2
        with:
          command: audit
          args: --dead-code-baseline fallow-baselines/dead-code.json --health-baseline fallow-baselines/health.json --dupes-baseline fallow-baselines/dupes.json

      - name: Run fast Vitest suites
        run: pnpm test

      - name: Cache Next.js
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build
        run: pnpm build

      - name: Visual regression (Vitest browser, Linux Docker)
        env:
          SKIP_VRT_DOCKER_INSTALL: "1"
        run: pnpm test:vrt

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run backend tests (Convex preview)
        run: pnpm test:backend

      - name: Run E2E (Convex preview)
        run: pnpm test:e2e
