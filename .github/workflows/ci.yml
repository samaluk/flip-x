name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      CONVEX_TEAM_ACCESS_TOKEN: ${{ secrets.CONVEX_TEAM_ACCESS_TOKEN }}
      # Optional: real phc_… token for preview deploys (matches prod). Deploy succeeds without it.
      POSTHOG_PROJECT_TOKEN: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
      POSTHOG_FLAGS_POLLING_INTERVAL_SECONDS: "300"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Convex preview deployment name
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "PREVIEW_DEPLOYMENT_NAME=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
            echo "GITHUB_PR_NUMBER=${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
          else
            echo "PREVIEW_DEPLOYMENT_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Lint DESIGN.md
        run: pnpm design:lint

      - name: Lint
        run: pnpm lint

      - name: Check i18n
        run: pnpm i18n:check

      - name: React Doctor
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm exec react-doctor --diff "origin/${{ github.base_ref }}" --fail-on warning --annotations --yes
          else
            pnpm exec react-doctor --diff "origin/master" --fail-on warning --annotations --yes
          fi

      - name: Fallow
        run: pnpm fallow:ci

      - name: Run fast Vitest suites
        run: pnpm test

      - name: Cache Next.js
        uses: actions/cache@v5.0.5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build
        run: pnpm build

      - name: Visual regression (Vitest browser, Linux Docker)
        env:
          SKIP_VRT_DOCKER_INSTALL: "1"
        run: pnpm test:vrt

      - name: Cache Playwright browsers
        uses: actions/cache@v5.0.5
        with:
          path: /home/runner/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run backend tests (Convex preview)
        run: pnpm test:backend

      - name: Run E2E (Convex preview)
        run: pnpm test:e2e
