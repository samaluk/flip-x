name: Cleanup Convex preview

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      # Plain Node only — delete-convex-preview.mjs has no pnpm deps. setup-toolchain
      # enables pnpm cache on GitHub-hosted runners, which fails post-job without install.
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: package.json

      - name: Delete Convex preview for closed PR
        env:
          CONVEX_TEAM_ACCESS_TOKEN: ${{ secrets.CONVEX_TEAM_ACCESS_TOKEN }}
          CONVEX_TEAM_SLUG: ${{ vars.CONVEX_TEAM_SLUG }}
          PREVIEW_DEPLOYMENT_NAME: pr-${{ github.event.pull_request.number }}
        run: node scripts/delete-convex-preview.mjs
