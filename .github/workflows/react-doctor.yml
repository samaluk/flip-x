name: React Doctor

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run React Doctor
        run: pnpm doctor --diff origin/${{ github.base_ref }} --fail-on warning --annotations --pr-comment --yes
